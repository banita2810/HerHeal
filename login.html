<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerHeal | Login</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="login-page">
    <div class="login-card">
        <img src="logo.png" alt="HerHeal" class="brand-logo">

        <h1 class="greeting">Hello, Beautiful!</h1>
        <p class="tagline">Because her healing matters.</p>

        <form id="loginForm">
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="enter-btn">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="#">Create Account</a>
            <span class="dot">•</span>
            <a href="#">Forgot Password</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
